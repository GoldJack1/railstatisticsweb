[build]
  # Directory to change to before starting a build
  base = "."

  # Directory that contains the deploy-ready HTML files and assets
  publish = "dist"

  # Build command to build React app with Vite
  command = "npm ci && npm run build"

[build.environment]
  # Node.js version - using Node 20 for better compatibility
  NODE_VERSION = "20"
  # Build environment
  NODE_ENV = "production"
  NETLIFY = "true"
  # Vite build configuration
  VITE_BUILD_MODE = "production"
  # Disable telemetry for faster builds
  VITE_DISABLE_TELEMETRY = "true"
  # Same-origin OSM tile + Nominatim proxies (strict browsers / Perplexity)
  VITE_USE_OSM_PROXY = "true"

# API routes must be declared before the SPA catch-all
[[redirects]]
  from = "/api/osm-tile"
  to = "/.netlify/functions/osm-tile"
  status = 200

[[redirects]]
  from = "/api/nominatim-search"
  to = "/.netlify/functions/nominatim-proxy"
  status = 200

[[redirects]]
  from = "/api/darwin/*"
  to = "/.netlify/functions/darwin-proxy/:splat"
  status = 200

# Redirect rules for SPA (Single Page Application) behavior
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
# CSP is defined only in public/_headers (copied to dist/). img-src includes https: for map tiles + analytics pixels.
[[headers]]
  for = "/*"
  [headers.values]
    # SPA shell (/, /review-pending, etc.) must not sit in browser cache while hashed /assets/* stay long-lived below.
    Cache-Control = "public, max-age=0, must-revalidate"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Cache HTML entry (direct *.html requests only; SPA "/" uses rules above)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"