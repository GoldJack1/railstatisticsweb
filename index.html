<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- CSP: duplicated in public/_headers for Netlify; meta ensures policy applies even if edge strips headers. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; font-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://www.gstatic.com https://www.google.com https://www.gstatic.com/recaptcha/releases/ https://www.googletagmanager.com; script-src-elem 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://www.gstatic.com https://www.google.com https://www.gstatic.com/recaptcha/releases/ https://www.googletagmanager.com; frame-src 'self' https://www.recaptcha.net https://www.google.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https://a.tile.openstreetmap.org https://b.tile.openstreetmap.org https://c.tile.openstreetmap.org https://www.googletagmanager.com https://www.google-analytics.com https://ssl.google-analytics.com; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://www.google.com https://www.recaptcha.net https://nominatim.openstreetmap.org https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://analytics.google.com https://*.analytics.google.com https://stats.g.doubleclick.net;">
    <!-- Single viewport tag; viewport-fit=cover needed for safe-area env() on iOS / Safari -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes">
    <!-- Lets UA know both schemes exist; active scheme follows data-theme + CSS color-scheme -->
    <meta name="color-scheme" content="light dark">
    <meta name="format-detection" content="telephone=no">
    <meta name="description" content="Rail Statistics - Track your railway station visits and statistics">
    <meta name="keywords" content="rail, statistics, railway, stations, tracking">
    <meta name="author" content="Rail Statistics">
    <!-- Before JS: match system UI; useTheme.ts then aligns all to stored app theme -->
    <meta name="theme-color" content="#e8eaed" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#22252d" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- default = opaque bar (light). JS sets black-translucent in dark so header bg reaches the top -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Rail Statistics">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Rail Statistics</title>
    <!-- Preload primary app font -->
    <link rel="preload" href="/fonts/Geologica_Cursive-Regular.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=1">
    <link rel="icon" type="image/png" href="/favicon.png?v=2" sizes="512x512">
    <!-- High-res PNG; iOS scales for home screen (Apple documents 180×180 as typical) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
