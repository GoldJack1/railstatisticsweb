<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- PRECACHE-REVISION -->
    <!-- Replaced with a unique value each prod build so Workbox refetches this document; otherwise CSP header updates in public/_headers alone never change the precache revision and clients keep an old Content-Security-Policy. -->
    <!-- Single viewport tag; viewport-fit=cover needed for safe-area env() on iOS / Safari -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=overlays-content, maximum-scale=5.0, user-scalable=yes">
    <!-- Lets UA know both schemes exist; active scheme follows data-theme + CSS color-scheme -->
    <meta name="color-scheme" content="light dark">
    <meta name="format-detection" content="telephone=no">
    <meta name="description" content="Rail Statistics - Track your railway station visits and statistics">
    <meta name="keywords" content="rail, statistics, railway, stations, tracking">
    <meta name="author" content="Rail Statistics">
    <!-- Before JS: match system UI; useTheme.ts then aligns all to stored app theme -->
    <meta name="theme-color" content="#e8eaed" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#22252d" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- default = opaque bar (light). JS sets black-translucent in dark so header bg reaches the top -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Rail Statistics">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Rail Statistics</title>
    <!-- Preload primary app font -->
    <link rel="preload" href="/fonts/Geologica_Cursive-Regular.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=1">
    <link rel="icon" type="image/png" href="/favicon.png?v=2" sizes="512x512">
    <!-- High-res PNG; iOS scales for home screen (Apple documents 180×180 as typical) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
